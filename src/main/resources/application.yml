spring:
  application:
    name: subastas_utn_user
  jackson:
    time-zone: UTC
  datasource:
    url: jdbc:postgresql://localhost:5432/subastas_utn_db
    username: subastas_utn_user
    password: subastas_utn_pass
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    secret: "TPI-UTN-ProgramacionIV-SecretKey-Minimo32Caracteres-2026"
    expiration-ms: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.utn.tpi.auction: INFO